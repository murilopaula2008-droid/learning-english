<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="fatherlogin_box">
        <div class="login_box">
            <div class="logo">
                <h1>Pratice English</h1>
            </div>
            <div class="info_cadastro">
                <h2>Entrar na conta</h2>
                <p>Ou <span class="destaque_cor">cadastra-se</span></p>
            </div>
            <div class="info_email">
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" placeholder="seu@email.com" class="box_pergunta">
            </div>
            <div class="info_senha">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" placeholder="•••••••••" class="box_pergunta">
            </div>

            <p class="esqueceusenha">Esqueceu sua senha?</p>
            <button class="entrar_login">Entrar</button>
        </div>
    </div>
</body>

</html>
